aid: niagaraopendata-ca
name: Niagara Open Data
description: >-
  Niagara Open Data is a county government open-data portal for Canada running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 529 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.

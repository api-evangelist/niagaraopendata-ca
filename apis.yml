apis:
  - aid: niagaraopendata-ca:catalog
    name: Niagara Open Data CKAN Action API
    description: >-
      CKAN Action API for Niagara Open Data, a consistent JSON-over-HTTP interface over a catalog of 529 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://niagaraopendata.ca/api/3/action/.
    humanURL: https://niagaraopendata.ca
